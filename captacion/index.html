<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B2A6B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Entreolas · Captación</title>
<style>
  :root{
    --navy:#1B2A6B;
    --teal:#108E9E;
    --teal-l:#18B0C6;
    --ink:#1a1d24;
    --grey:#5b6270;
    --line:#e4e7ec;
    --bg:#f5f6f8;
    --card:#ffffff;
    --pend:#8a91a0;
    --visit:#108E9E;
    --client:#1f9d55;
    --descartar:#b04a4a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    font-size:16px;
    line-height:1.4;
    padding-bottom:88px;
  }

  /* Cabecera */
  header{
    background:var(--navy);
    color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 16px 0;
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .emblem{width:46px;height:46px;border-radius:11px;background:#fff;flex:0 0 auto;}
  .brand-txt{display:flex;flex-direction:column;line-height:1.05;}
  .brand .mark{font-weight:700;letter-spacing:.14em;font-size:19px;}
  .brand .sub{font-size:11px;letter-spacing:.05em;color:#b9c2e8;text-transform:uppercase;margin-top:2px;}
  .tagline{font-size:13px;color:#c7cef0;margin:2px 0 12px;}
  .counters{display:flex;gap:8px;padding-bottom:12px;}
  .counter{
    flex:1;background:rgba(255,255,255,.08);border-radius:10px;
    padding:8px 6px;text-align:center;
  }
  .counter b{display:block;font-size:20px;line-height:1.1;}
  .counter span{font-size:10.5px;color:#c7cef0;text-transform:uppercase;letter-spacing:.04em;}
  /* Onda separadora */
  .wave{display:block;width:100%;height:14px;}

  /* Filtros */
  .filters{
    position:sticky;top:0;z-index:10;background:var(--bg);
    padding:10px 12px 6px;border-bottom:1px solid var(--line);
  }
  .frow{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
  .frow::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--grey);
    padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;
  }
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .chip.est.on{background:var(--teal);border-color:var(--teal);}

  /* Grupos de zona */
  .zone{padding:14px 12px 2px;}
  .zone h2{
    font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);
    margin:0 0 4px;display:flex;align-items:center;gap:8px;
  }
  .zone h2 .n{color:var(--grey);font-weight:400;letter-spacing:0;text-transform:none;}
  .zone .note{font-size:12.5px;color:var(--grey);margin:0 0 10px;}

  /* Tarjeta */
  .card{
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--pend);
    border-radius:12px;padding:12px 12px 10px;margin:0 12px 10px;
  }
  .card[data-est="visitado"]{border-left-color:var(--visit);}
  .card[data-est="cliente"]{border-left-color:var(--client);}
  .card[data-est="descartado"]{border-left-color:var(--descartar);opacity:.72;}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .name{font-weight:700;font-size:16px;color:var(--navy);margin:0;}
  .meta{font-size:12.5px;color:var(--grey);margin:2px 0 0;}
  .rate{flex:0 0 auto;font-size:12.5px;color:var(--grey);text-align:right;white-space:nowrap;}
  .rate b{color:var(--ink);font-size:14px;}
  .hook{
    font-size:13.5px;color:#33383f;margin:9px 0 10px;
    background:#f0fafb;border-radius:8px;padding:8px 10px;border:1px solid #dff1f3;
  }
  .actions{display:flex;gap:8px;margin-bottom:10px;}
  .act{
    flex:1;text-decoration:none;text-align:center;font-size:13.5px;font-weight:600;
    padding:9px 6px;border-radius:9px;border:1px solid var(--line);color:var(--navy);background:#fff;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .act.call{background:var(--navy);color:#fff;border-color:var(--navy);}
  .act.off{opacity:.4;pointer-events:none;}
  .act svg{width:15px;height:15px;}

  .states{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .sbtn{
    border:1px solid var(--line);background:#fff;color:var(--grey);
    font-size:12px;font-weight:600;padding:7px 2px;border-radius:8px;cursor:pointer;
  }
  .sbtn[data-s="visitado"].on{background:var(--visit);color:#fff;border-color:var(--visit);}
  .sbtn[data-s="cliente"].on{background:var(--client);color:#fff;border-color:var(--client);}
  .sbtn[data-s="descartado"].on{background:var(--descartar);color:#fff;border-color:var(--descartar);}
  .sbtn[data-s="pendiente"].on{background:var(--pend);color:#fff;border-color:var(--pend);}

  .notebox{
    margin-top:8px;width:100%;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;font-family:inherit;font-size:13.5px;color:var(--ink);resize:vertical;min-height:38px;
  }
  .notebox::placeholder{color:#aab0bb;}

  /* Barra inferior */
  .bar{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:#fff;border-top:1px solid var(--line);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex;gap:8px;
  }
  .bar button{
    flex:1;border:1px solid var(--navy);background:#fff;color:var(--navy);
    font-family:inherit;font-size:13.5px;font-weight:700;padding:11px 6px;border-radius:10px;cursor:pointer;
  }
  .bar button.primary{background:var(--navy);color:#fff;}
  .hidden{display:none!important;}

  /* Botón flotante añadir */
  .fab{
    position:fixed;right:16px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:35;
    width:56px;height:56px;border-radius:50%;border:none;
    background:var(--teal);color:#fff;font-size:30px;line-height:1;
    box-shadow:0 4px 14px rgba(16,142,158,.45);cursor:pointer;
  }
  .fab:active{transform:scale(.94);}

  /* Formulario modal */
  .modal{
    position:fixed;inset:0;z-index:60;background:rgba(20,25,40,.55);
    display:flex;align-items:flex-end;justify-content:center;
  }
  .modal-card{
    background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    max-height:92vh;overflow-y:auto;
  }
  .modal-card h3{margin:0 0 12px;color:var(--navy);font-size:18px;}
  .modal-card label{display:block;font-size:12.5px;color:var(--grey);font-weight:600;margin-bottom:12px;}
  .modal-card input,.modal-card select,.modal-card textarea{
    display:block;width:100%;margin-top:4px;border:1px solid var(--line);border-radius:9px;
    padding:10px;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;
  }
  .modal-card textarea{min-height:60px;resize:vertical;}
  .modal-actions{display:flex;gap:8px;margin-top:4px;}
  .modal-actions button{
    flex:1;border:1px solid var(--navy);background:#fff;color:var(--navy);
    font-family:inherit;font-size:14px;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;
  }
  .modal-actions button.primary{background:var(--navy);color:#fff;}

  .rate.tagm{color:var(--teal);font-weight:700;font-size:11px;}
  .del{
    margin-top:8px;background:none;border:none;color:var(--descartar);
    font-family:inherit;font-size:12.5px;font-weight:600;padding:2px 0;cursor:pointer;text-decoration:underline;
  }

  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 16px;border-radius:999px;
    font-size:13px;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center;
  }
  .toast.show{opacity:1;}
  input[type=file]{display:none;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="icon-192.png" class="emblem" alt="Entreolas">
    <div class="brand-txt"><span class="mark">ENTREOLAS</span><span class="sub">captación</span></div>
  </div>
  <p class="tagline">Bares y restaurantes potenciales · pescado y marisco</p>
  <div class="counters">
    <div class="counter"><b id="cPend">0</b><span>Pendientes</span></div>
    <div class="counter"><b id="cVisit">0</b><span>Visitados</span></div>
    <div class="counter"><b id="cClient">0</b><span>Clientes</span></div>
  </div>
</header>
<svg class="wave" viewBox="0 0 1440 40" preserveAspectRatio="none" aria-hidden="true">
  <path fill="#1B2A6B" d="M0,0 L1440,0 L1440,18 C1200,40 960,4 720,20 C480,36 240,6 0,22 Z"></path>
  <path fill="#108E9E" opacity="0.9" d="M0,22 C240,6 480,36 720,20 C960,4 1200,40 1440,18 L1440,26 C1200,44 960,10 720,26 C480,42 240,12 0,28 Z"></path>
</svg>

<div class="filters">
  <div class="frow" id="zoneChips">
    <button class="chip on" data-z="todas">Todas las zonas</button>
    <button class="chip" data-z="Dos Hermanas">Dos Hermanas</button>
    <button class="chip" data-z="Los Bermejales">Los Bermejales</button>
  </div>
  <div class="frow" id="estChips">
    <button class="chip est on" data-e="todos">Todos</button>
    <button class="chip est" data-e="pendiente">Pendientes</button>
    <button class="chip est" data-e="visitado">Visitados</button>
    <button class="chip est" data-e="cliente">Clientes</button>
    <button class="chip est" data-e="descartado">Descartados</button>
  </div>
</div>

<main id="list"></main>

<div class="bar">
  <button id="btnWa">Resumen WhatsApp</button>
  <button id="btnExport">Exportar copia</button>
  <button class="primary" id="btnImport">Restaurar</button>
  <input type="file" id="fileImport" accept="application/json">
</div>

<button class="fab" id="fab" aria-label="Añadir local">+</button>

<div class="modal hidden" id="modal">
  <div class="modal-card">
    <h3>Añadir local a mano</h3>
    <label>Nombre *<input id="fNombre" type="text" placeholder="Ej: Bar La Esquina"></label>
    <label>Tipo<input id="fTipo" type="text" placeholder="Bar de tapas, cervecería, restaurante..."></label>
    <label>Zona *<select id="fZonaSel"></select></label>
    <label id="fZonaNewWrap" class="hidden">Nueva zona<input id="fZonaNew" type="text" placeholder="Ej: Sevilla capital"></label>
    <label>Dirección<input id="fDir" type="text" placeholder="Calle y número"></label>
    <label>Teléfono<input id="fTel" type="tel" inputmode="numeric" placeholder="600000000"></label>
    <label>Nota / gancho<textarea id="fHook" placeholder="Qué venden, con quién hablar, cuándo volver..."></textarea></label>
    <div class="modal-actions">
      <button id="mCancel">Cancelar</button>
      <button class="primary" id="mSave">Guardar local</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* --- Datos de partida (editables) --- */
var PROSPECTS = [
  // ===== DOS HERMANAS =====
  {id:"dh1", zona:"Dos Hermanas", nombre:"La Gamba Mesón", tipo:"Restaurante", rate:4.3, revs:406,
   dir:"C. Real de Utrera, 145, Dos Hermanas", tel:"955674921",
   hook:"El nombre lo dice: gambas y marisco en carta. Preséntate con muestra de marisco fresco."},
  {id:"dh2", zona:"Dos Hermanas", nombre:"Bar restaurante Casa Rafa", tipo:"Bar-restaurante", rate:4.5, revs:2439,
   dir:"C. Álava, 27, Dos Hermanas", tel:"954725123",
   hook:"Muy concurrido y precios bajos → rota mucho producto. Juega la carta del reparto diario."},
  {id:"dh3", zona:"Dos Hermanas", nombre:"Restaurante Casa Frasco", tipo:"Restaurante", rate:4.4, revs:2604,
   dir:"C. Sierra Elvira, 2, Dos Hermanas", tel:"657988671",
   hook:"Carta amplia y volumen alto. Ofrécele regularidad de suministro."},
  {id:"dh4", zona:"Dos Hermanas", nombre:"Bodeguita El Capote", tipo:"Bar-bodega", rate:4.5, revs:1639,
   dir:"C. Leopoldo Alas Clarín, 154, Dos Hermanas", tel:"955671050",
   hook:"Pizarra de sugerencias que cambia a diario → compra fresco y variado. Encaje perfecto."},
  {id:"dh5", zona:"Dos Hermanas", nombre:"K'aproveche Bar de Tapas", tipo:"Bar de tapas", rate:4.4, revs:738,
   dir:"Av. de España, 108, Dos Hermanas", tel:"955667905",
   hook:"Tapas con pulpo y bacalao. Ofrécele producto para rotar novedades."},
  {id:"dh6", zona:"Dos Hermanas", nombre:"Bar La Cigala (lo del Sobri)", tipo:"Bar", rate:4.1, revs:480,
   dir:"Av. de Adolfo Suárez, 8, Dos Hermanas", tel:"955704106",
   hook:"Reseñas se quejan de pescado 'pasado' → entra ofreciendo género más fresco. Ese es el gancho."},
  {id:"dh7", zona:"Dos Hermanas", nombre:"La Lianta Restaurante y Tapas", tipo:"Bar-restaurante", rate:4.3, revs:240,
   dir:"C. María Zambrano, 6, Dos Hermanas", tel:"660389807",
   hook:"Tapas modernas con atún y gamba. Local pequeño, trato fácil."},
  {id:"dh8", zona:"Dos Hermanas", nombre:"Bar Jaula", tipo:"Bar de tapas", rate:4.4, revs:2227,
   dir:"C. San Rafael, 2, Dos Hermanas", tel:"",
   hook:"Bar de barrio lleno de clientela local. No tiene teléfono público → pásate en persona."},
  {id:"dh9", zona:"Dos Hermanas", nombre:"Cervecería La Mar de Gambas", tipo:"Cervecería", rate:3.6, revs:363,
   dir:"Av. los Pirralos, 21, Dos Hermanas", tel:"681658159",
   hook:"Baja prioridad: margen de mejora en calidad, pero reseñas hablan de trato difícil del dueño."},

  // ===== LOS BERMEJALES =====
  {id:"lb1", zona:"Los Bermejales", nombre:"La Mar Nuestra Marisquería", tipo:"Marisquería", rate:4.8, revs:400,
   dir:"Av. del Reino Unido, 1, Sevilla", tel:"685684531",
   hook:"Marisquería pura de barrio: alto consumo de marisco y pescado fresco. Diana principal."},
  {id:"lb2", zona:"Los Bermejales", nombre:"Restaurante Meza Diego", tipo:"Restaurante", rate:4.8, revs:2233,
   dir:"Av. de Finlandia s/n, Sevilla", tel:"660022275",
   hook:"Chipirones, gambas y calamar frescos muy alabados. Gran volumen de pescado."},
  {id:"lb3", zona:"Los Bermejales", nombre:"Cervecería Huracán", tipo:"Cervecería", rate:4.2, revs:2378,
   dir:"Av. de Alemania, 7, Sevilla", tel:"954610543",
   hook:"Especialidad marisco (gambas, lenguado, atún). Ojo: es cadena, el proveedor puede estar cerrado."},
  {id:"lb4", zona:"Los Bermejales", nombre:"Cervecería El Toque", tipo:"Cervecería", rate:4.7, revs:132,
   dir:"Av. de Finlandia, 3, Sevilla", tel:"",
   hook:"Nueva y pequeña, lomo de atún en carta. Fácil de entrar. Sin teléfono → visita en persona."},
  {id:"lb5", zona:"Los Bermejales", nombre:"Poderío Taberna Picaresca", tipo:"Taberna", rate:4.7, revs:239,
   dir:"Av. de Alemania, 46, Sevilla", tel:"854755819",
   hook:"Carta variada con gambas al ajillo. Local pequeño y cuidado."},
  {id:"lb6", zona:"Los Bermejales", nombre:"Bar Laescapada", tipo:"Bar de barrio", rate:4.7, revs:347,
   dir:"Av. de Finlandia, 5, Sevilla", tel:"629249450",
   hook:"Bar de barrio siempre lleno. Tapas variadas y trato cercano."},
  {id:"lb7", zona:"Los Bermejales", nombre:"Bar-Terraza La Cucamona", tipo:"Bar-terraza", rate:4.4, revs:664,
   dir:"Av. de Finlandia, 7, Sevilla", tel:"670517376",
   hook:"Terraza con carta variada. Buen punto de entrada en la calle Finlandia."},
  {id:"lb8", zona:"Los Bermejales", nombre:"Fuera de Carta Bermejales", tipo:"Bar-restaurante", rate:4.5, revs:2000,
   dir:"Av. de Finlandia, 5, Sevilla", tel:"608833256",
   hook:"Mucho volumen y carta amplia. Ofrece suministro fiable a la puerta."},
  {id:"lb9", zona:"Los Bermejales", nombre:"Castaño Vinos y Tapas", tipo:"Bar de tapas", rate:4.9, revs:37,
   dir:"Av. de Alemania, 6, Sevilla", tel:"675844117",
   hook:"Recién abierto y muy bien valorado. Aún montando proveedores → momento ideal para entrar."}
];

var ZONE_NOTES = {
  "Los Bermejales":"Casi todos en Av. de Finlandia y Av. de Alemania: están pegados, se patean a pie del tirón."
};

var STORE_KEY = "entreolas_captacion_v1";
var CUSTOM_KEY = "entreolas_captacion_custom_v1";
var state = {};          // id -> {est, nota}
var custom = [];         // locales añadidos a mano
var fZona = "todas", fEst = "todos";

function load(){
  try{ state = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ state = {}; }
  try{ custom = JSON.parse(localStorage.getItem(CUSTOM_KEY)) || []; }
  catch(e){ custom = []; }
  if(!Array.isArray(custom)) custom = [];
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}
function saveCustom(){
  try{ localStorage.setItem(CUSTOM_KEY, JSON.stringify(custom)); }catch(e){}
}
function allProspects(){ return PROSPECTS.concat(custom); }
function zoneList(){
  var zs=[];
  allProspects().forEach(function(p){ if(zs.indexOf(p.zona)<0) zs.push(p.zona); });
  return zs;
}
function sanitize(s){ return String(s||"").replace(/[<>"]/g,"").slice(0,200); }
function get(id){ if(!state[id]) state[id]={est:"pendiente",nota:""}; return state[id]; }

function mapsUrl(p){
  return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(p.nombre+", "+p.dir);
}

var CALL_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.6a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.5-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2z"/></svg>';
var MAP_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';

function render(){
  var list=document.getElementById("list");
  list.innerHTML="";
  var zonas=zoneList();
  var shown=0;

  zonas.forEach(function(z){
    if(fZona!=="todas" && fZona!==z) return;
    var items=allProspects().filter(function(p){
      if(p.zona!==z) return false;
      if(fEst!=="todos" && get(p.id).est!==fEst) return false;
      return true;
    });
    if(!items.length) return;

    var sec=document.createElement("section");
    sec.className="zone";
    var note = ZONE_NOTES[z] ? '<p class="note">'+ZONE_NOTES[z]+'</p>' : '';
    sec.innerHTML='<h2>'+z+' <span class="n">· '+items.length+'</span></h2>'+note;

    items.forEach(function(p){
      shown++;
      var st=get(p.id);
      var card=document.createElement("div");
      card.className="card";
      card.setAttribute("data-est",st.est);

      var telAct = p.tel
        ? '<a class="act call" href="tel:+34'+p.tel+'">'+CALL_SVG+'Llamar</a>'
        : '<span class="act off">'+CALL_SVG+'Sin tel.</span>';

      var isCustom = (""+p.id).charAt(0)==="u";
      var rateHtml = (p.rate>0)
        ? '<div class="rate"><b>'+p.rate.toFixed(1)+'</b>★<br>'+p.revs+'</div>'
        : '<div class="rate tagm">a mano</div>';
      var delHtml = isCustom
        ? '<button class="del" data-del="'+p.id+'">Eliminar este local</button>'
        : '';

      card.innerHTML=
        '<div class="top">'+
          '<div><p class="name">'+p.nombre+'</p><p class="meta">'+p.tipo+(p.dir?' · '+p.dir:'')+'</p></div>'+
          rateHtml+
        '</div>'+
        '<div class="hook">'+p.hook+'</div>'+
        '<div class="actions">'+
          telAct+
          '<a class="act" target="_blank" rel="noopener" href="'+mapsUrl(p)+'">'+MAP_SVG+'Mapa</a>'+
        '</div>'+
        '<div class="states">'+
          '<button class="sbtn" data-s="pendiente">Pendiente</button>'+
          '<button class="sbtn" data-s="visitado">Visitado</button>'+
          '<button class="sbtn" data-s="cliente">Cliente</button>'+
          '<button class="sbtn" data-s="descartado">Descartar</button>'+
        '</div>'+
        '<textarea class="notebox" placeholder="Nota: con quién hablaste, qué pediste, cuándo volver...">'+ (st.nota||"") +'</textarea>'+
        delHtml;

      // estado activo
      card.querySelectorAll(".sbtn").forEach(function(b){
        if(b.getAttribute("data-s")===st.est) b.classList.add("on");
        b.addEventListener("click",function(){
          st.est=b.getAttribute("data-s"); save(); render(); updateCounters();
        });
      });
      // nota
      var ta=card.querySelector(".notebox");
      ta.addEventListener("input",function(){ st.nota=ta.value; save(); });
      // eliminar (solo locales a mano)
      var delBtn=card.querySelector(".del");
      if(delBtn){
        delBtn.addEventListener("click",function(){
          if(!confirm('¿Eliminar "'+p.nombre+'" de la lista?')) return;
          custom=custom.filter(function(x){ return x.id!==p.id; });
          delete state[p.id];
          saveCustom(); save(); renderZoneChips(); render();
          toast("Local eliminado");
        });
      }

      sec.appendChild(card);
    });
    list.appendChild(sec);
  });

  if(!shown){
    list.innerHTML='<section class="zone"><p class="note">No hay locales con este filtro. Cambia de zona o de estado arriba.</p></section>';
  }
  updateCounters();
}

function updateCounters(){
  var p=0,v=0,c=0;
  allProspects().forEach(function(x){
    var e=get(x.id).est;
    if(e==="visitado")v++; else if(e==="cliente")c++; else if(e==="pendiente")p++;
  });
  document.getElementById("cPend").textContent=p;
  document.getElementById("cVisit").textContent=v;
  document.getElementById("cClient").textContent=c;
}

/* Chips de zona dinámicos */
function renderZoneChips(){
  if(fZona!=="todas" && zoneList().indexOf(fZona)<0) fZona="todas";
  var c=document.getElementById("zoneChips");
  var html='<button class="chip'+(fZona==="todas"?" on":"")+'" data-z="todas">Todas las zonas</button>';
  zoneList().forEach(function(z){
    html+='<button class="chip'+(fZona===z?" on":"")+'" data-z="'+z+'">'+z+'</button>';
  });
  c.innerHTML=html;
}

/* Filtros */
document.getElementById("zoneChips").addEventListener("click",function(e){
  var b=e.target.closest(".chip"); if(!b)return;
  this.querySelectorAll(".chip").forEach(function(x){x.classList.remove("on");});
  b.classList.add("on"); fZona=b.getAttribute("data-z"); render();
});
document.getElementById("estChips").addEventListener("click",function(e){
  var b=e.target.closest(".chip"); if(!b)return;
  this.querySelectorAll(".chip").forEach(function(x){x.classList.remove("on");});
  b.classList.add("on"); fEst=b.getAttribute("data-e"); render();
});

/* Toast */
var toastT;
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("show");},2200);
}

/* Resumen WhatsApp */
document.getElementById("btnWa").addEventListener("click",function(){
  var byEst={cliente:[],visitado:[],pendiente:[],descartado:[]};
  allProspects().forEach(function(p){ byEst[get(p.id).est].push(p); });
  var t="*Captación Entreolas*\n";
  t+="Clientes: "+byEst.cliente.length+" · Visitados: "+byEst.visitado.length+" · Pendientes: "+byEst.pendiente.length+"\n";
  function bloque(tit,arr){
    if(!arr.length)return"";
    var s="\n*"+tit+":*\n";
    arr.forEach(function(p){
      s+="• "+p.nombre+" ("+p.zona+")"+(p.tel?" — "+p.tel:"")+"\n";
      var n=get(p.id).nota; if(n) s+="   ↳ "+n+"\n";
    });
    return s;
  }
  t+=bloque("Nuevos clientes",byEst.cliente);
  t+=bloque("Visitados (seguimiento)",byEst.visitado);
  t+=bloque("Pendientes",byEst.pendiente);

  if(navigator.share){
    navigator.share({text:t}).catch(function(){copy(t);});
  } else { copy(t); }
});
function copy(t){
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(function(){toast("Resumen copiado");},function(){fallbackCopy(t);}); }
  else fallbackCopy(t);
}
function fallbackCopy(t){
  var a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();
  try{document.execCommand("copy");toast("Resumen copiado");}catch(e){toast("Cópialo a mano");}
  document.body.removeChild(a);
}

/* Export / Import */
document.getElementById("btnExport").addEventListener("click",function(){
  var payload={state:state, custom:custom};
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  var d=new Date().toISOString().slice(0,10);
  a.href=url;a.download="entreolas-captacion-copia-"+d+".json";
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},120);
  toast("Copia descargada");
});
document.getElementById("btnImport").addEventListener("click",function(){
  document.getElementById("fileImport").click();
});
document.getElementById("fileImport").addEventListener("change",function(e){
  var f=e.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var o=JSON.parse(ev.target.result);
      if(o && typeof o==="object"){
        if(o.state || o.custom){
          if(o.state) for(var k in o.state){ state[k]=o.state[k]; }
          if(Array.isArray(o.custom)) custom=o.custom;
        } else {
          for(var k2 in o){ state[k2]=o[k2]; }
        }
        saveCustom();save();renderZoneChips();render();toast("Datos restaurados");
      } else toast("Archivo no válido");
    }catch(err){toast("No se pudo leer el archivo");}
  };
  r.readAsText(f);
  e.target.value="";
});

/* Añadir local a mano */
var modal=document.getElementById("modal");
var zSel=document.getElementById("fZonaSel");
function openModal(){
  var opts="";
  zoneList().forEach(function(z){ opts+='<option value="'+z+'">'+z+'</option>'; });
  opts+='<option value="__new__">➕ Nueva zona…</option>';
  zSel.innerHTML=opts;
  document.getElementById("fZonaNewWrap").classList.add("hidden");
  ["fNombre","fTipo","fDir","fTel","fHook","fZonaNew"].forEach(function(id){ document.getElementById(id).value=""; });
  modal.classList.remove("hidden");
  document.getElementById("fNombre").focus();
}
function closeModal(){ modal.classList.add("hidden"); }
document.getElementById("fab").addEventListener("click",openModal);
document.getElementById("mCancel").addEventListener("click",closeModal);
modal.addEventListener("click",function(e){ if(e.target===modal) closeModal(); });
zSel.addEventListener("change",function(){
  document.getElementById("fZonaNewWrap").classList.toggle("hidden", zSel.value!=="__new__");
});
document.getElementById("mSave").addEventListener("click",function(){
  var nombre=document.getElementById("fNombre").value.trim();
  if(!nombre){ toast("Ponle un nombre al local"); return; }
  var zona=zSel.value;
  if(zona==="__new__"){
    zona=document.getElementById("fZonaNew").value.trim();
    if(!zona){ toast("Escribe la zona nueva"); return; }
  }
  var tel=document.getElementById("fTel").value.replace(/[^0-9]/g,"");
  var p={
    id:"u"+Date.now(),
    zona:sanitize(zona),
    nombre:sanitize(nombre),
    tipo:sanitize(document.getElementById("fTipo").value.trim())||"Local",
    rate:0, revs:0,
    dir:sanitize(document.getElementById("fDir").value.trim()),
    tel:tel,
    hook:sanitize(document.getElementById("fHook").value.trim())||"Local añadido a mano. Anota aquí cómo entrarle."
  };
  custom.push(p); saveCustom();
  fZona=p.zona; fEst="todos";
  closeModal(); renderZoneChips(); render();
  toast("Local añadido");
});

load(); renderZoneChips(); render();

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
